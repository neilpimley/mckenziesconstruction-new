<main class="gallery-page">
  <section class="page-hero gallery-page-hero" [style.background-image]="heroBackground">
    <div class="container">
      <a class="btn btn-outline-light back-link" [routerLink]="['/']" fragment="gallery">
        <i class="bi bi-arrow-left" aria-hidden="true"></i>
        Back to home
      </a>

      <ng-container *ngIf="album; else missingAlbum">
        <div class="gallery-page-header">
          <p class="eyebrow">Past Projects</p>
          <h1>{{ album.title }}</h1>
          <p class="lead">{{ album.summary }}</p>
          <span>{{ album.images.length }} photos</span>
        </div>
      </ng-container>
    </div>
  </section>

  <ng-container *ngIf="album">
    <section class="section gallery-page-section">
      <div class="container">
        <div class="gallery-page-grid">
          <button class="gallery-image" type="button" *ngFor="let image of album.images; let imageIndex = index" (click)="openGalleryModal(imageIndex)">
            <img [src]="image.src" [alt]="image.alt" loading="lazy" />
          </button>
        </div>
      </div>
    </section>

    <div class="gallery-modal" *ngIf="activeImage as image" role="dialog" aria-modal="true" [attr.aria-label]="album.title" (click)="closeGalleryModal()">
      <button class="gallery-modal-close" type="button" aria-label="Close image viewer" (click)="closeGalleryModal(); $event.stopPropagation()">
        <i class="bi bi-x-lg" aria-hidden="true"></i>
      </button>
      <button class="gallery-modal-arrow gallery-modal-arrow-previous" type="button" aria-label="Previous photo" (click)="showPreviousImage(); $event.stopPropagation()">
        <i class="bi bi-chevron-left" aria-hidden="true"></i>
      </button>
      <figure class="gallery-modal-content" (click)="$event.stopPropagation()">
        <img [src]="image.src" [alt]="image.alt" />
        <figcaption>
          <span>{{ album.title }}</span>
          <span>{{ activeImageIndex! + 1 }} / {{ album.images.length }}</span>
        </figcaption>
      </figure>
      <button class="gallery-modal-arrow gallery-modal-arrow-next" type="button" aria-label="Next photo" (click)="showNextImage(); $event.stopPropagation()">
        <i class="bi bi-chevron-right" aria-hidden="true"></i>
      </button>
    </div>
  </ng-container>

  <ng-template #missingAlbum>
    <div class="not-found-panel">
      <p class="eyebrow">Past Projects</p>
      <h1>Project unavailable</h1>
      <p class="lead">Return to the home page to browse the available project albums.</p>
    </div>
  </ng-template>
</main>
