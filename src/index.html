<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>McKenzies Construction</title>
  <meta
    name="description"
    content="McKenzies Construction provides extensions, renovations, commercial building work, bathrooms, garages and patios."
  >
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>
<body>
  <!-- Hidden form so Netlify detects fields at build time (required for Angular SPAs) -->
  <form name="contact" netlify netlify-honeypot="bot-field" hidden>
    <input type="text" name="name" />
    <input type="tel" name="phone" />
    <select name="projectType"></select>
    <textarea name="message"></textarea>
    <input name="bot-field" />
  </form>

  <app-root></app-root>
</body>
</html>
